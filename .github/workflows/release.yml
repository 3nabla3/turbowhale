name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: turbowhale
            artifact_suffix: x86_64-linux
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: turbowhale
            artifact_suffix: aarch64-linux
            use_cross: true

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: turbowhale
            artifact_suffix: aarch64-macos
            use_cross: false

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary_name: turbowhale.exe
            artifact_suffix: x86_64-windows
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain and target
        run: rustup show && rustup target add ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use_cross }}
        with:
          tool: cross

      - name: Build with cross
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build natively
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          BINARY_SRC: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
        run: |
          if [[ "$ARTIFACT_SUFFIX" == "x86_64-windows" ]]; then
            DST="turbowhale-${TAG}-${ARTIFACT_SUFFIX}.exe"
          else
            DST="turbowhale-${TAG}-${ARTIFACT_SUFFIX}"
          fi
          cp "$BINARY_SRC" "$DST"
          echo "ARTIFACT_FILE=$DST" >> "$GITHUB_ENV"

      - name: Import macOS signing certificate
        if: matrix.runner == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Sign macOS binary
        if: matrix.runner == 'macos-latest'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$MACOS_SIGNING_IDENTITY" --options runtime "${{ env.ARTIFACT_FILE }}"
          codesign --verify --verbose "${{ env.ARTIFACT_FILE }}"

      - name: Notarize macOS binary
        if: matrix.runner == 'macos-latest'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.ARTIFACT_FILE }}" \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_suffix }}
          path: ${{ env.ARTIFACT_FILE }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
